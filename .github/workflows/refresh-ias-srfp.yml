name: Refresh IAS SRFP data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

concurrency:
  group: refresh-ias-srfp-data
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scraper dependencies
        run: python -m pip install -r requirements.txt

      - name: Refresh selected-list data
        run: python scripts/scrape_ias_srfp.py --output-dir .

      - name: Commit refreshed data
        run: |
          if git diff --quiet -- ias_srfp2026_selected_people.csv ias_srfp2026_subject_results.csv ias_srfp2026_route_summary.md; then
            echo "No IAS SRFP data changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ias_srfp2026_selected_people.csv ias_srfp2026_subject_results.csv ias_srfp2026_route_summary.md
          git commit -m "Refresh IAS SRFP 2026 data"
          git push
